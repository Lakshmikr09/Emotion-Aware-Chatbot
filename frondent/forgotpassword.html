<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Poppins", sans-serif; }

   body 
    {
      height: 100vh; background: url("c4.jpeg") no-repeat center center/cover;
      display: flex;
      justify-content: center; 
      align-items: center; 
      position: relative;
     }

    .container {
      width: 400px; max-width: 90%;
      background: rgba(255,255,255,0.12);
      border-radius: 20px; backdrop-filter: blur(15px);
      padding: 40px 35px; color: #fff; text-align: center;
      box-shadow: 0 0 40px rgba(0,0,0,0.3);
    }

    h2 { margin-bottom: 25px; font-size: 26px; }

    .form-group { position: relative; margin-bottom: 18px; }

    .form-group input {
      width: 100%; padding: 12px 45px 12px 12px;
      border: none; border-radius: 10px; outline: none;
      font-size: 15px; background: rgba(255,255,255,0.25); color: #fff;
    }

    .form-group i {
      position: absolute; right: 15px; top: 13px;
      color: #fff; cursor: pointer;
    }

    .password-rules {
      display: flex; flex-wrap: wrap;
      justify-content: center; gap: 6px;
      margin: 10px 0; font-size: 11px;
    }

    .password-rules span {
      background: rgba(255,255,255,0.2);
      padding: 4px 6px; border-radius: 5px;
      transition: 0.3s;
    }

    .password-rules span.valid {
      background: #00ff88; color: #000; font-weight: 600;
    }

    .btn {
      width: 100%; background: linear-gradient(90deg, #36d1dc, #5b86e5);
      border: none; padding: 12px; border-radius: 8px;
      color: white; font-size: 16px; cursor: pointer;
    }

    .btn:hover { transform: scale(1.03); }

    .link { margin-top: 15px; font-size: 14px; }
    .link a { color: #ffea00; text-decoration: none; font-weight: bold; }

    .popup {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6); display: none;
      justify-content: center; align-items: center; z-index: 100;
    }

    .popup-content {
      background: #fff; color: #333; border-radius: 15px;
      padding: 30px 40px; text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
      animation: pop 0.4s ease;
    }

    @keyframes pop {
      from { transform: scale(0.7); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .popup-content h3 { color: #00c853; margin-bottom: 10px; font-size: 22px; }

    .popup-content button {
      background: #ff4b2b; border: none; color: #fff;
      padding: 10px 25px; border-radius: 8px; cursor: pointer;
      margin-top: 10px; font-weight: 600;
    }

    .popup-content button:hover { background: #ff416c; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Reset Your Password</h2>
    <p style="margin-bottom: 15px; font-size: 14px;">
      Enter your new password below and confirm it to reset your account.
    </p>

    <div class="form-group">
      <input type="password" id="newPassword" placeholder="New Password" required />
      <i class="fa fa-eye" id="toggleNew"></i>
    </div>

    <div class="password-rules">
      <span id="rule-lower">Lowercase</span>
      <span id="rule-upper">Uppercase</span>
      <span id="rule-number">Number</span>
      <span id="rule-special">Special</span>
      <span id="rule-length">8+ chars</span>
    </div>

    <div class="form-group">
      <input type="password" id="confirmPassword" placeholder="Confirm Password" required />
      <i class="fa fa-eye" id="toggleConfirm"></i>
    </div>

    <button class="btn" id="resetBtn">Reset Password</button>

    <div class="link">
      <a href="login.html">Back to Login</a>
    </div>
  </div>

  <!-- Success Popup -->
  <div class="popup" id="popup">
    <div class="popup-content">
      <h3>✅ Password Reset Successful!</h3>
      <p>Your password has been updated successfully.</p>
      <button id="closePopup">OK</button>
    </div>
  </div>

  <script src="https://kit.fontawesome.com/a81368914c.js" crossorigin="anonymous"></script>
  <script>
    const newPassword = document.getElementById("newPassword");
    const confirmPassword = document.getElementById("confirmPassword");
    const toggleNew = document.getElementById("toggleNew");
    const toggleConfirm = document.getElementById("toggleConfirm");
    const resetBtn = document.getElementById("resetBtn");
    const popup = document.getElementById("popup");
    const closePopup = document.getElementById("closePopup");

    // Password toggle icons
    toggleNew.addEventListener("click", () => {
      newPassword.type = newPassword.type === "password" ? "text" : "password";
      toggleNew.classList.toggle("fa-eye-slash");
    });
    toggleConfirm.addEventListener("click", () => {
      confirmPassword.type = confirmPassword.type === "password" ? "text" : "password";
      toggleConfirm.classList.toggle("fa-eye-slash");
    });

    // Password rule checks
    const rules = {
      lower: document.getElementById("rule-lower"),
      upper: document.getElementById("rule-upper"),
      number: document.getElementById("rule-number"),
      special: document.getElementById("rule-special"),
      length: document.getElementById("rule-length"),
    };

    newPassword.addEventListener("input", () => {
      const val = newPassword.value;
      const check = {
        lower: /[a-z]/.test(val),
        upper: /[A-Z]/.test(val),
        number: /[0-9]/.test(val),
        special: /[!@#$%^&*(),.?":{}|<>]/.test(val),
        length: val.length >= 8,
      };
      for (let key in check)
        check[key] ? rules[key].classList.add("valid") : rules[key].classList.remove("valid");
    });

    // Reset Password logic
    resetBtn.addEventListener("click", () => {
      const newPass = newPassword.value.trim();
      const confirmPass = confirmPassword.value.trim();

      if (!newPass || !confirmPass) {
        alert("Please fill in both password fields!");
        return;
      }
      if (newPass !== confirmPass) {
        alert("Passwords do not match!");
        return;
      }

      // Show success popup
      popup.style.display = "flex";
    });

    closePopup.addEventListener("click", () => {
      popup.style.display = "none";
      window.location.href = "login.html";
    });
  </script>
</body>
</html>
