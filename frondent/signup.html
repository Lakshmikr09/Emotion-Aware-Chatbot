<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up</title>
  <style>
    * {
      margin: 0; padding: 0; box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body 
    {
      height: 100vh; background: url("c5.jpg") no-repeat center center/cover;
      display: flex;
      justify-content: center; 
      align-items: center;  
      position: relative;
     }

    .container {
      width: 400px; max-width: 90%;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      backdrop-filter: blur(15px);
      padding: 40px 35px;
      color: #fff; text-align: center;
      box-shadow: 0 0 40px rgba(0,0,0,0.3);
    }

    h2 { margin-bottom: 25px; font-size: 26px; }

    .form-group { position: relative; margin-bottom: 18px; }

    .form-group input {
      width: 100%; padding: 12px 45px 12px 12px;
      border: none; border-radius: 10px;
      outline: none; font-size: 15px;
      background: rgba(255,255,255,0.25); color: #fff;
    }

    .form-group i {
      position: absolute; right: 15px; top: 13px;
      color: #fff; cursor: pointer;
    }

    .password-rules {
      display: flex; flex-wrap: wrap;
      justify-content: center; gap: 6px;
      margin: 10px 0; font-size: 11px;
    }

    .password-rules span {
      background: rgba(255,255,255,0.2);
      padding: 4px 6px; border-radius: 5px;
      transition: 0.3s;
    }

    .password-rules span.valid {
      background: #00ff88; color: #000; font-weight: 600;
    }

    .btn {
      width: 100%; background: linear-gradient(90deg, #ff5f6d, #ffc371);
      border: none; padding: 12px; border-radius: 8px;
      color: white; font-size: 16px; cursor: pointer;
    }

    .btn:hover { transform: scale(1.03); }

    .link { margin-top: 15px; font-size: 14px; }
    .link a { color: #ffea00; text-decoration: none; font-weight: bold; }

    .popup {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6); display: none;
      justify-content: center; align-items: center; z-index: 100;
    }

    .popup-content {
      background: #fff; color: #333; border-radius: 15px;
      padding: 30px 40px; text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
      animation: pop 0.4s ease;
    }

    @keyframes pop {
      from { transform: scale(0.7); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .popup-content h3 { color: #00c853; margin-bottom: 10px; font-size: 22px; }

    .popup-content button {
      background: #0072ff; border: none; color: #fff;
      padding: 10px 25px; border-radius: 8px; cursor: pointer;
      margin-top: 10px; font-weight: 600;
    }

    .popup-content button:hover { background: #00c6ff; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Create Your Account</h2>
    <div class="form-group">
      <input type="text" id="name" placeholder="Full Name" required />
    </div>
    <div class="form-group">
      <input type="email" id="email" placeholder="Email" required />
    </div>
    <div class="form-group">
      <input type="password" id="password" placeholder="Password" required />
      <i class="fa fa-eye" id="togglePassword"></i>
    </div>

    <div class="password-rules">
      <span id="rule-lower">Lowercase</span>
      <span id="rule-upper">Uppercase</span>
      <span id="rule-number">Number</span>
      <span id="rule-special">Special</span>
      <span id="rule-length">8+ chars</span>
    </div>

    <button class="btn" id="signupBtn">Sign Up</button>
    <div class="link">Already have an account? <a href="login.html">Login</a></div>
  </div>

  <!-- Success Popup -->
  <div class="popup" id="popup">
    <div class="popup-content">
      <h3>🎉 Signup Successful!</h3>
      <p>Your account has been created successfully.</p>
      <button id="closePopup">OK</button>
    </div>
  </div>

  <script src="https://kit.fontawesome.com/a81368914c.js" crossorigin="anonymous"></script>
  <script>
    const togglePassword = document.getElementById("togglePassword");
    const password = document.getElementById("password");
    const signupBtn = document.getElementById("signupBtn");
    const popup = document.getElementById("popup");
    const closePopup = document.getElementById("closePopup");

    togglePassword.addEventListener("click", () => {
      password.type = password.type === "password" ? "text" : "password";
      togglePassword.classList.toggle("fa-eye-slash");
    });

    const rules = {
      lower: document.getElementById("rule-lower"),
      upper: document.getElementById("rule-upper"),
      number: document.getElementById("rule-number"),
      special: document.getElementById("rule-special"),
      length: document.getElementById("rule-length"),
    };

    password.addEventListener("input", () => {
      const val = password.value;
      const check = {
        lower: /[a-z]/.test(val),
        upper: /[A-Z]/.test(val),
        number: /[0-9]/.test(val),
        special: /[!@#$%^&*(),.?":{}|<>]/.test(val),
        length: val.length >= 8,
      };
      for (let key in check)
        check[key] ? rules[key].classList.add("valid") : rules[key].classList.remove("valid");
    });

    signupBtn.addEventListener("click", () => {
      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const pass = password.value.trim();

      if (name && email && pass) popup.style.display = "flex";
      else alert("Please fill in all fields!");
    });

    closePopup.addEventListener("click", () => {
      popup.style.display = "none";
      window.location.href = "login.html";
    });
  </script>
</body>
</html>
